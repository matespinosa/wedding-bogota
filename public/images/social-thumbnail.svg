<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Invitacion de boda de Mateo y Julieth</title>
  <desc id="desc">Tarjeta social con monograma M y J, texto de invitacion, fecha y lugar de la boda.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f6f0"/>
      <stop offset="0.58" stop-color="#eceae1"/>
      <stop offset="1" stop-color="#f3f1e8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="64%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.58" stop-color="#f7f6f0" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#d9d3c5" stop-opacity="0.36"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#232a22" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="42" y="42" width="1116" height="546" fill="none" stroke="#232a22" stroke-opacity="0.18" stroke-width="2"/>

  <g opacity="0.08" fill="#232a22" font-family="Georgia, 'Times New Roman', serif" font-size="190" font-weight="500">
    <text x="94" y="222">M</text>
    <text x="969" y="506">J</text>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="600" cy="178" r="70" fill="#f7f6f0" stroke="#232a22" stroke-width="2.4"/>
    <text x="600" y="191" text-anchor="middle" fill="#232a22" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="500" letter-spacing="1">
      M<tspan font-style="italic" font-size="32"> &amp; </tspan>J
    </text>
  </g>

  <text x="600" y="304" text-anchor="middle" fill="#97783f" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" letter-spacing="4">
    TE INVITAMOS A
  </text>
  <text x="600" y="398" text-anchor="middle" fill="#232a22" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="500" letter-spacing="1">
    nuestra boda
  </text>
  <text x="600" y="470" text-anchor="middle" fill="#232a22" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="500">
    Mateo &amp; Julieth
  </text>
  <text x="600" y="522" text-anchor="middle" fill="#5c6157" font-family="Jost, Arial, sans-serif" font-size="22" font-weight="400" letter-spacing="7">
    3 OCTUBRE 2026 · BOGOTA, COLOMBIA
  </text>
</svg>
